<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Muslim Daily Quran</title>
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4D8F76" />
    <style>
      /* Hide the top bar and unnecessary UI from Google Translate */
      .goog-te-banner-frame.skiptranslate,
      .goog-te-banner-frame {
        display: none !important;
        visibility: hidden !important;
      }
      body {
        top: 0px !important; 
        position: static !important;
      }
      html {
        top: 0px !important;
      }
      #goog-gt-tt {
        display: none !important;
      }
      /* Hide new google translate banner classes if any */
      .VIpgJd-ZVi9od-aZ2wEe-wOHMyf {
         display: none !important;
      }
      .skiptranslate iframe {
        display: none !important;
        visibility: hidden !important;
      }
      #google_translate_element {
        position: absolute;
        top: -9999px;
        left: -9999px;
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="google_translate_element"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        if (typeof google === 'undefined' || !google.translate) return;
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async defer></script>
  </body>
</html>
